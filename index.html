<title>保險客戶資料庫</title>
<style>
:root{
  --pine:#173F39; --pine-2:#1F5249; --teal:#3C8C7C; --teal-soft:#E3F0EC;
  --amber:#B97E27; --amber-soft:#F2E2BE;
  --paper:#F4F2EA; --surface:#FFFFFF; --surface-2:#FBFAF5;
  --ink:#17231E; --muted:#6C7A74; --faint:#94A09A;
  --line:#E4E0D5; --line-2:#EEEBE2;
  --slate:#647570; --clay:#A2855F;
  --danger:#B23B3B; --danger-soft:#F3DCDC;
  --ok:#3C8C7C;
  --shadow:0 1px 2px rgba(23,35,30,.05), 0 10px 26px rgba(23,35,30,.07);
  --shadow-lg:0 8px 40px rgba(23,35,30,.18);
  --r:14px; --r-sm:10px; --r-lg:20px;
  --mono:ui-monospace,"SF Mono",Menlo,"Roboto Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--paper);
  -webkit-text-size-adjust:100%; line-height:1.5;
  padding-bottom:calc(64px + var(--safe-bottom));
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;color:inherit}
::placeholder{color:var(--faint)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:var(--pine);color:#F4F2EA;
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 0 rgba(0,0,0,.12);
}
.brand{display:flex;flex-direction:column;line-height:1.15;margin-right:auto;min-width:0}
.brand b{font-size:17px;font-weight:700;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand span{font-size:11px;color:#A9C2BA;letter-spacing:1.5px;text-transform:uppercase}
.topact{display:flex;align-items:center;gap:8px}
.tb-btn{
  height:38px;padding:0 13px;border-radius:999px;font-size:13.5px;font-weight:600;
  background:rgba(255,255,255,.12);color:#F4F2EA;display:inline-flex;align-items:center;gap:6px;
  transition:background .15s,transform .1s;
}
.tb-btn:active{transform:scale(.95)}
.tb-btn.primary{background:var(--amber);color:#241A06}
.tb-btn.icon{width:38px;padding:0;justify-content:center;font-size:20px}

/* backup status pill */
.backup{
  display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 12px;border-radius:999px;
  font-size:12.5px;font-weight:600;background:rgba(255,255,255,.1);
}
.backup .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(60,140,124,.25)}
.backup.dirty{background:rgba(185,126,39,.22);color:#F2E2BE}
.backup.dirty .dot{background:var(--amber);box-shadow:0 0 0 3px rgba(185,126,39,.3);animation:pulse 1.6s infinite}
.backup.fail{background:rgba(178,59,59,.25);color:#F3DCDC}
.backup.fail .dot{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ---------- layout ---------- */
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.viewhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 14px}
.viewhead h2{font-size:21px;margin:0;font-weight:700;letter-spacing:.3px}
.viewhead .count{font-family:var(--mono);font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:2px 9px;border-radius:999px}
.spacer{margin-left:auto}

.search{
  flex:1;min-width:200px;height:42px;border:1px solid var(--line);background:var(--surface);
  border-radius:12px;padding:0 14px;display:flex;align-items:center;gap:9px;
}
.search input{border:none;background:none;outline:none;width:100%;height:100%}
.search svg{flex:none;color:var(--faint)}

.filters{display:flex;gap:7px;flex-wrap:wrap}
.regionwrap{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 10px 0 12px;border:1px solid var(--line);background:var(--surface);border-radius:999px;color:var(--pine)}
.regionwrap svg{flex:none;color:var(--muted)}
.regionsel{border:none;background:none;outline:none;font-size:13px;font-weight:600;color:var(--pine);height:32px;padding-right:2px;max-width:150px}
.regiontag{background:var(--teal-soft);color:#1f5249;font-weight:600;padding:1px 8px;border-radius:999px;font-size:11.5px}
.chip{
  height:34px;padding:0 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);
  font-size:13px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:6px;transition:.12s;
}
.chip.on{background:var(--pine);color:#fff;border-color:var(--pine)}
.chip:active{transform:scale(.96)}
.chip .n{font-family:var(--mono);font-size:11px;opacity:.85}

/* ---------- client cards ---------- */
.clientgrid{display:grid;grid-template-columns:1fr;gap:11px}
@media(min-width:720px){.clientgrid{grid-template-columns:1fr 1fr}}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  padding:15px 16px;transition:transform .1s,box-shadow .15s;position:relative;overflow:hidden;
}
.card:active{transform:scale(.992)}
.card .grade-edge{position:absolute;left:0;top:0;bottom:0;width:5px}
.card-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.avatar{
  width:44px;height:44px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;background:var(--pine-2);letter-spacing:1px;
}
.card h3{margin:0;font-size:16.5px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card .sub{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.card .sub .mono{font-size:12px}
.gradebadge{
  font-size:11px;font-weight:800;width:22px;height:22px;border-radius:7px;display:inline-flex;
  align-items:center;justify-content:center;color:#fff;flex:none;
}
.g-A{background:var(--amber)} .g-B{background:var(--teal)} .g-C{background:var(--slate)} .g-D{background:var(--clay)}
.g-none{background:#C9D0CC;color:#5d6b66}

/* sop spine */
.spine{display:flex;align-items:center;gap:0;margin-top:4px}
.spine .seg{flex:1;height:5px;border-radius:3px;background:var(--line);position:relative}
.spine .seg.done{background:var(--teal)}
.spine .seg.cur{background:var(--amber)}
.spine-mini{display:flex;gap:4px;align-items:center}
.spine-mini i{width:7px;height:7px;border-radius:50%;background:var(--line);display:block}
.spine-mini i.done{background:var(--teal)} .spine-mini i.cur{background:var(--amber);transform:scale(1.35)}
.steplabel{font-size:11.5px;color:var(--muted);margin-top:7px;display:flex;justify-content:space-between}
.steplabel b{color:var(--pine);font-weight:700}

/* ---------- empty / generic ---------- */
.empty{
  text-align:center;padding:54px 24px;color:var(--muted);
  background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);
}
.empty .big{font-size:34px;margin-bottom:10px}
.empty h3{margin:0 0 6px;color:var(--ink);font-size:17px}
.empty p{margin:0 0 16px;font-size:14px}

/* ---------- bottom nav ---------- */
.bottomnav{
  position:fixed;left:0;right:0;bottom:0;z-index:45;
  background:rgba(251,250,245,.92);backdrop-filter:saturate(1.5) blur(14px);
  -webkit-backdrop-filter:saturate(1.5) blur(14px);
  border-top:1px solid var(--line);
  display:flex;padding:6px 6px calc(6px + var(--safe-bottom));
}
.navbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;
  color:var(--muted);font-size:10.5px;font-weight:600;transition:.12s;
}
.navbtn svg{width:23px;height:23px}
.navbtn.on{color:var(--pine)}
.navbtn.on .ic{background:var(--teal-soft)}
.navbtn .ic{width:46px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;transition:.12s}
.navbtn .badge{position:absolute;transform:translate(13px,-8px);background:var(--danger);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:var(--mono)}

/* ---------- modal ---------- */
.scrim{
  position:fixed;inset:0;z-index:60;background:rgba(23,35,30,.42);
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(2px);
}
.scrim.show{display:flex}
.sheet{
  background:var(--paper);width:100%;max-width:680px;max-height:94vh;border-radius:22px 22px 0 0;
  box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;
  animation:up .25s cubic-bezier(.2,.7,.2,1);
}
@media(min-width:680px){.scrim{align-items:center}.sheet{border-radius:22px;max-height:90vh}}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet-head{
  display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);
  background:var(--surface);flex:none;
}
.sheet-head h2{margin:0;font-size:18px;font-weight:700;margin-right:auto}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px;flex:1}
.x{width:36px;height:36px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);border:1px solid var(--line)}
.x:active{transform:scale(.92)}

/* ---------- form ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.3px}
.field input,.field select,.field textarea{
  width:100%;height:46px;border:1px solid var(--line);border-radius:11px;background:var(--surface);
  padding:0 13px;outline:none;transition:border .15s,box-shadow .15s;
}
.field textarea{height:auto;min-height:74px;padding:11px 13px;line-height:1.55;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:520px){.row3{grid-template-columns:1fr 1fr}}
.formsec{margin:22px 0 8px;font-size:13px;font-weight:800;color:var(--pine);letter-spacing:1px;display:flex;align-items:center;gap:9px}
.formsec::after{content:"";flex:1;height:1px;background:var(--line)}

/* grade picker */
.gradepick{display:flex;gap:8px}
.gradepick button{
  flex:1;height:48px;border-radius:11px;border:1.5px solid var(--line);background:var(--surface);
  font-weight:800;font-size:15px;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
}
.gradepick button small{font-size:9.5px;font-weight:600;letter-spacing:.3px}
.gradepick button.sel.s-A{background:var(--amber);color:#fff;border-color:var(--amber)}
.gradepick button.sel.s-B{background:var(--teal);color:#fff;border-color:var(--teal)}
.gradepick button.sel.s-C{background:var(--slate);color:#fff;border-color:var(--slate)}
.gradepick button.sel.s-D{background:var(--clay);color:#fff;border-color:var(--clay)}
.gradepick button.sel.s-none{background:var(--pine);color:#fff;border-color:var(--pine)}

/* sop step picker */
.soppick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.soppick button{
  border:1.5px solid var(--line);background:var(--surface);border-radius:11px;padding:9px 5px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;transition:.12s;
}
.soppick .num{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--muted)}
.soppick small{font-size:10.5px;color:var(--muted);font-weight:600;line-height:1.2}
.soppick button.done{border-color:var(--teal);background:var(--teal-soft)}
.soppick button.done .num{color:var(--teal)}
.soppick button.cur{border-color:var(--amber);background:var(--amber);}
.soppick button.cur .num,.soppick button.cur small{color:#fff}

/* policy / claim rows */
.subcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px;position:relative}
.subcard .del{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:8px;background:var(--danger-soft);color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:17px}
.sopmini{width:36px;height:42px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--pine);font-size:16px;font-weight:700;flex:none}
.sopmini:active{transform:scale(.94)}
.sopmini[disabled]{opacity:.3}
.sopmini.del{color:var(--danger);background:var(--danger-soft);border-color:var(--danger-soft);position:static;width:36px;height:42px}
.addrow{
  width:100%;height:44px;border:1.5px dashed var(--line);border-radius:11px;color:var(--pine);font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:7px;background:var(--surface-2);
}
.addrow:active{transform:scale(.99)}

/* buttons */
.btn{height:48px;border-radius:12px;font-weight:700;font-size:15.5px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 18px;transition:transform .1s,filter .15s}
.btn:active{transform:scale(.98)}
.btn.full{width:100%}
.btn.green{background:var(--pine);color:#fff}
.btn.amber{background:var(--amber);color:#241A06}
.btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink)}
.btn.red{background:var(--danger-soft);color:var(--danger)}
.btnrow{display:flex;gap:10px;margin-top:8px}

/* detail */
.detail-hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:17px;margin-bottom:14px;box-shadow:var(--shadow)}
.detail-hero .top{display:flex;gap:13px;align-items:center}
.detail-hero h2{margin:0;font-size:22px}
.detail-hero .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-top:10px}
.detail-hero .meta a{color:var(--pine);font-weight:600;text-decoration:none}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.kpi .v{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--pine)}
.kpi .l{font-size:11px;color:var(--muted);margin-top:2px}

.block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:13px;overflow:hidden;box-shadow:var(--shadow)}
.block>h4{margin:0;padding:14px 16px;font-size:14px;font-weight:800;letter-spacing:.5px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:8px;background:var(--surface-2)}
.block>h4 .tag{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:600}
.block-body{padding:14px 16px}
.kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:14px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted)}
.kv .v{font-weight:600;text-align:right}

/* sop detail spine */
.sopfull{padding:6px 16px}
.sopstep{display:flex;gap:12px;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line-2);cursor:pointer;border-radius:8px;transition:background .12s}
.sopstep:active{background:var(--surface-2)}
.sopstep:last-child{border:none}
.sopstep .badge{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:14px;background:var(--line);color:var(--muted)}
.sopstep.done .badge{background:var(--teal);color:#fff}
.sopstep.cur .badge{background:var(--amber);color:#fff}
.sopstep .t{font-weight:700;font-size:14px}
.sopstep.done .t,.sopstep.cur .t{color:var(--ink)}
.sopstep .t small{display:block;font-weight:500;color:var(--muted);font-size:12px;margin-top:2px;line-height:1.4}
.sopstep .sopedit{color:var(--faint);flex:none}
.sopstep.cur .sopedit{color:var(--amber)}

/* line templates */
.linebtn{
  width:100%;text-align:left;background:#06C755;color:#fff;border-radius:12px;padding:13px 15px;margin-bottom:9px;
  display:flex;align-items:center;gap:11px;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(6,199,85,.22);
}
.linebtn:active{transform:scale(.99)}
.linebtn .ic{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.linebtn small{display:block;font-weight:500;opacity:.9;font-size:12px;margin-top:2px}
.linepreview{
  background:#DCF8C6;border:1px solid #c9ecb4;border-radius:16px 16px 16px 5px;
  padding:13px 16px;font-size:14px;line-height:1.65;white-space:pre-wrap;color:#16321a;
  box-shadow:var(--shadow);
}

/* reminder list */
.remgroup{margin-bottom:18px}
.remgroup>h4{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:1px;margin:0 0 9px;display:flex;align-items:center;gap:8px}
.remgroup.over>h4{color:var(--danger)}
.remitem{
  display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);
}
.remitem .date{font-family:var(--mono);font-size:12px;font-weight:700;text-align:center;flex:none;width:46px;line-height:1.15}
.remitem .date b{display:block;font-size:18px;color:var(--pine)}
.remitem.over .date b{color:var(--danger)}
.remitem .body{flex:1;min-width:0}
.remitem .body .t{font-weight:700;font-size:14px}
.remitem .body .who{font-size:12.5px;color:var(--muted);margin-top:2px}
.remitem .type{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;flex:none}
.t-bday{background:var(--amber-soft);color:#7a5410}
.t-pay{background:var(--teal-soft);color:#1f5249}
.t-mat{background:#E7E0F0;color:#503b78}
.t-care{background:#E9EDEB;color:#475550}
.t-manual{background:#F0E7D8;color:#6b5326}
.t-visit{background:#D9EDE6;color:#1f5249}

/* ---------- calendar ---------- */
.calbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.calbar .mtitle{font-weight:800;font-size:16px;font-family:var(--mono);letter-spacing:.5px;min-width:118px;text-align:center}
.calnav{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--pine)}
.calnav:active{transform:scale(.94)}
.caltoday{height:38px;padding:0 13px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-weight:700;font-size:13px;color:var(--pine)}
.calbar .tb-btn.primary{margin-left:auto}
.calgrid{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface-2);border-bottom:1px solid var(--line)}
.calhead div{padding:9px 0;text-align:center;font-size:12px;font-weight:700;color:var(--muted)}
.calhead .sun{color:#b85c5c}
.calweeks{display:grid;grid-template-columns:repeat(7,1fr)}
.calcell{min-height:78px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);padding:5px 4px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.calcell:nth-child(7n){border-right:none}
.calcell:active{background:var(--surface-2)}
.calcell.out{background:var(--surface-2)}
.calcell.out .dn{color:var(--faint)}
.calcell .dn{font-size:12.5px;font-weight:700;font-family:var(--mono);width:23px;height:21px;display:flex;align-items:center;justify-content:center;color:var(--ink)}
.calcell .dn.sun{color:#b85c5c}
.calcell.today .dn{background:var(--pine);color:#fff;border-radius:7px}
.calchip{font-size:10px;font-weight:700;line-height:1.35;padding:1px 5px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calmore{font-size:9.5px;color:var(--muted);font-weight:700;padding-left:4px}
.callegend{display:flex;flex-wrap:wrap;gap:14px;margin:12px 4px 0;justify-content:center}
.callegend .leg{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600}
.callegend .leg i{width:11px;height:11px;border-radius:4px;display:block}
@media(max-width:380px){.calcell{min-height:64px}.calchip{font-size:9px;padding:1px 3px}}
.checkbtn{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:transparent;font-size:16px}
.checkbtn:active{border-color:var(--teal)}

/* toast */
.toast{
  position:fixed;left:50%;bottom:calc(78px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:80;
  opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow-lg);max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.warn{background:var(--amber);color:#241A06}
.toast.err{background:var(--danger)}

/* info card (説明) */
.info{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:13px;box-shadow:var(--shadow)}
.info h3{margin:0 0 10px;font-size:16px;display:flex;align-items:center;gap:9px}
.info p{margin:0 0 10px;font-size:14px;color:var(--ink)}
.info ol,.info ul{margin:0;padding-left:20px;font-size:14px}
.info li{margin-bottom:7px}
.steplist{counter-reset:s;list-style:none;padding:0}
.steplist li{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line-2)}
.steplist li:last-child{border:none}
.steplist .n{counter-increment:s;font-family:var(--mono);font-weight:700;width:28px;height:28px;border-radius:8px;background:var(--pine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
.steplist .n::before{content:counter(s)}
.steplist b{font-size:14.5px}
.steplist small{display:block;color:var(--muted);font-size:12.5px;margin-top:2px}

textarea.raw{width:100%;min-height:160px;font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--surface-2);line-height:1.5}

/* ---------- mode toggle ---------- */
.cmode{display:flex;gap:3px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px}
.cmode button{height:34px;padding:0 15px;border-radius:8px;font-size:13.5px;font-weight:700;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.cmode button.on{background:var(--pine);color:#fff}
.cmode svg{width:15px;height:15px}

/* ---------- kanban board ---------- */
.board{
  display:flex;gap:11px;overflow-x:auto;overflow-y:hidden;
  padding:2px 2px 10px;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
}
.kcol{
  flex:0 0 230px;width:230px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:15px;display:flex;flex-direction:column;
  max-height:calc(100dvh - 250px);scroll-snap-align:start;transition:background .12s,outline .12s;
}
.kcol.drop{outline:2px dashed var(--amber);outline-offset:-2px;background:var(--amber-soft)}
.kcol-head{
  padding:11px 13px;display:flex;align-items:center;gap:9px;flex:none;
  border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface-2);
  border-radius:15px 15px 0 0;z-index:1;
}
.kcol-head .num{font-family:var(--mono);font-weight:700;width:25px;height:25px;border-radius:8px;background:var(--pine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex:none}
.kcol-head .t{flex:1;min-width:0;font-weight:700;font-size:13.5px;line-height:1.15}
.kcol-head .t small{display:block;font-weight:500;color:var(--muted);font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kcol-head .c{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:1px 8px;flex:none}
.kcol-body{padding:9px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;display:flex;flex-direction:column;gap:8px;min-height:56px}
.kcard{
  background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 12px;
  box-shadow:var(--shadow);position:relative;touch-action:auto;cursor:grab;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;overflow:hidden;
}
.kcard .edge{position:absolute;left:0;top:0;bottom:0;width:4px}
.kcard h4{margin:0 0 4px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;padding-left:4px}
.kcard .meta{font-size:11.5px;color:var(--muted);padding-left:4px}
.kcard.dragging{opacity:.32}
.kghost{position:fixed;z-index:90;pointer-events:none;transform:rotate(1.5deg) scale(1.02);box-shadow:var(--shadow-lg);cursor:grabbing;margin:0}
.kempty{color:var(--faint);font-size:12px;text-align:center;padding:18px 6px;border:1px dashed var(--line);border-radius:10px}
.boardhint{font-size:12px;color:var(--muted);margin:10px 2px 0;display:flex;align-items:center;gap:7px}

.hide{display:none!important}
.danger-zone{margin-top:26px;padding-top:18px;border-top:1px dashed var(--line)}
</style>

0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2]);

function sha256(msg){
  let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
  const l=msg.length, bitHi=Math.floor(l/0x20000000), bitLo=(l<<3)>>>0;
  const withOne=l+1, k=(56-(withOne%64)+64)%64, total=withOne+k+8;
  const buf=new Uint8Array(total); buf.set(msg,0); buf[l]=0x80;

  const w=new Uint32Array(64); const ROTR=(n,x)=>((x>>>n)|(x<<(32-n)))>>>0;
  for(let off=0;off<total;off+=64){

  }
  const out=new Uint8Array(32), odv=new DataView(out.buffer);
  [h0,h1,h2,h3,h4,h5,h6,h7].forEach((x,i)=>odv.setUint32(i*4,x>>>0,false));

}
function concatU8(){ let n=0; for(const a of arguments) n+=a.length; const o=new Uint8Array(n); let p=0; for(const a of arguments){ o.set(a,p); p+=a.length; } return o; }
function hmacSha256(key,msg){
  const B=64; if(key.length>B) key=sha256(key);

function pbkdf2(pw,salt,iter,dkLen){
  const hLen=32, blocks=Math.ceil(dkLen/hLen), out=new Uint8Array(blocks*hLen);

  return out.slice(0,dkLen);

      QR(0,5,10,15);QR(1,6,11,12);QR(2,7,8,13);QR(3,4,9,14);
    }
    const ks=new Uint8Array(64), dv=new DataView(ks.buffer);
    for(let i=0;i<16;i++) dv.setUint32(i*4,(x[i]+s[i])>>>0,true);
    return ks;
  }
  let ctr=counter>>>0;
  for(let off=0;off<data.length;off+=64){
    const ks=block(ctr++); const n=Math.min(64,data.length-off);
    for(let i=0;i<n;i++) out[off+i]=data[off+i]^ks[i];
  }
  return out;
}
function ctEqual(a,b){ if(a.length!==b.length) return false; let r=0; for(let i=0;i<a.length;i++) r|=a[i]^b[i]; return r===0; }

/* ---- helpers ---- */
const ITER=30000;
function utf8(s){ return new TextEncoder().encode(s); }
function utf8dec(u){ return new TextDecoder().decode(u); }
function randomBytes(n){ const a=new Uint8Array(n);
  if(typeof crypto!=="undefined" && crypto.getRandomValues) crypto.getRandomValues(a);
  else for(let i=0;i<n;i++) a[i]=Math.floor(Math.random()*256);
  return a; }
function b64(u){ let s=""; for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }
function ub64(str){ const s=atob(str); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; }

// derive enc + mac keys: one PBKDF2 master (32B), then HKDF-style expand (cheap)
function deriveKeys(pw,salt,iter){
  const master=pbkdf2(pw,salt,iter,32);
  const encKey=hmacSha256(master,utf8("insure-crm-enc"));
  const macKey=hmacSha256(master,utf8("insure-crm-mac"));
  return {encKey,macKey};
}
function encryptPayload(plainStr,password){
  const salt=randomBytes(16), nonce=randomBytes(12), pw=utf8(password);
  const {encKey,macKey}=deriveKeys(pw,salt,ITER);
  const ct=chacha20(encKey,nonce,1,utf8(plainStr));
  const mac=hmacSha256(macKey,concatU8(salt,nonce,ct));
  return {app:"insure-crm",enc:1,alg:"chacha20-hmacsha256",kdf:"pbkdf2-sha256-hkdf",iter:ITER,
          salt:b64(salt),nonce:b64(nonce),ct:b64(ct),mac:b64(mac)};
}
function decryptPayload(env,password){
  const salt=ub64(env.salt),nonce=ub64(env.nonce),ct=ub64(env.ct),mac=ub64(env.mac),pw=utf8(password);
  const {encKey,macKey}=deriveKeys(pw,salt,env.iter||ITER);
  if(!ctEqual(mac,hmacSha256(macKey,concatU8(salt,nonce,ct)))) throw new Error("BAD_PASSWORD");
  return utf8dec(chacha20(encKey,nonce,1,ct));
}
function isEncrypted(o){ return o && o.enc===1 && o.alg==="chacha20-hmacsha256" && o.ct && o.mac && o.salt && o.nonce; }

function nextOccur(monthDay){ // monthDay = "MM-DD" -> next YYYY-MM-DD >= today
  if(!monthDay) return null;
  const [mm,dd]=monthDay.split("-").map(Number);

  let y=t.getFullYear();

  if(cand<t){ cand=new Date(y+1, mm-1, dd); }

}

/* ============ reminders (auto derived + manual) ============ */
function autoReminders(c){
  const out=[];
  const bmd = mdFromISO(c.birthday);
  if(bmd){ const d=nextOccur(bmd); if(d) out.push({date:d, type:"bday", title:"生日關懷", who:c.name, clientId:c.id, auto:true}); }
  (c.policies||[]).forEach(p=>{
    const payMd = mdFromISO(p.paymentDate)||mdFromISO(p.startDate);
    if(payMd){ const d=nextOccur(payMd); if(d) out.push({date:d, type:"pay", title:`${p.name||"保單"} 繳費／周年`, who:c.name, clientId:c.id, auto:true}); }
    if(p.maturityDate && p.maturityDate>=todayISO()){
      out.push({date:p.maturityDate, type:"mat", title:`${p.name||"保單"} 滿期`, who:c.name, clientId:c.id, auto:true});
    }
  });
  return out;
}
function allReminders(){
  const list=[];
  DB.clients.forEach(c=>{
    autoReminders(c).forEach(r=>list.push(r));
    (c.reminders||[]).filter(r=>!r.done).forEach(r=>list.push({date:r.date,type:r.kind||"manual",title:r.title,who:c.name,clientId:c.id,id:r.id,note:r.note}));
  });
  return list.sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:0);
}
/* events for a given month (recurring birthdays/payments expanded into that month) */
function eventsInMonth(y, m0){  // m0: 0-11
  const mm=pad(m0+1); const ev=[];
  DB.clients.forEach(c=>{
    const b=mdFromISO(c.birthday);
    if(b && b.slice(0,2)===mm) ev.push({date:`${y}-${b}`, type:"bday", title:"生日", who:c.name, clientId:c.id});
    (c.policies||[]).forEach(p=>{
      const payMd=mdFromISO(p.paymentDate)||mdFromISO(p.startDate);
      if(payMd && payMd.slice(0,2)===mm) ev.push({date:`${y}-${payMd}`, type:"pay", title:`${p.name||"保單"} 繳費／周年`, who:c.name, clientId:c.id});
      if(p.maturityDate){ const a=p.maturityDate.split("-"); if(+a[0]===y && a[1]===mm) ev.push({date:p.maturityDate, type:"mat", title:`${p.name||"保單"} 滿期`, who:c.name, clientId:c.id}); }
    });
    (c.reminders||[]).filter(r=>!r.done && r.date).forEach(r=>{ const a=r.date.split("-"); if(+a[0]===y && a[1]===mm) ev.push({date:r.date, type:r.kind||"manual", title:r.title, who:c.name, clientId:c.id, id:r.id, note:r.note}); });
  });
  return ev;
}
function dueSoonCount(){
  const t=todayISO();
  const in7=new Date(); in7.setDate(in7.getDate()+7); const lim=in7.toLocaleDateString("sv");
  return allReminders().filter(r=> r.date<=lim).length;
}

/* ---- board drag controller (touch + mouse, iPad-safe) ---- */
function bindBoard(){
  const b=document.getElementById("board");
  if(!b || b.dataset.bound) return;
  b.dataset.bound="1";
  b.addEventListener("touchstart", bdDown, {passive:false});
  b.addEventListener("touchmove", bdMove, {passive:false});
  b.addEventListener("touchend", bdUp);
  b.addEventListener("touchcancel", bdUp);
  b.addEventListener("mousedown", bdDown);
}
function bdDown(e){
  const card=e.target.closest && e.target.closest(".kcard");
  if(!card) return;
  const pt=e.touches?e.touches[0]:e;
  bd={card, id:card.dataset.id, from:+card.dataset.step, sx:pt.clientX, sy:pt.clientY,
      lastX:pt.clientX, lastY:pt.clientY, dragging:false, tap:true, drop:null, lp:null, ghost:null, raf:null, off:{x:0,y:0}};
  if(e.type==="mousedown"){ window.addEventListener("mousemove", bdMove); window.addEventListener("mouseup", bdUp); }
  else { bd.lp=setTimeout(()=>{ const p={clientX:bd.lastX, clientY:bd.lastY}; bdStart(p); }, 200); }
}
function bdStart(pt){
  if(!bd) return;
  bd.dragging=true; bd.tap=false;
  const r=bd.card.getBoundingClientRect();
  bd.off.x=pt.clientX-r.left; bd.off.y=pt.clientY-r.top;
  const g=bd.card.cloneNode(true);
  g.className="kcard kghost";
  g.style.width=r.width+"px";
  g.style.left=(pt.clientX-bd.off.x)+"px";
  g.style.top=(pt.clientY-bd.off.y)+"px";
  document.body.appendChild(g);
  bd.ghost=g;
  bd.card.classList.add("dragging");
  document.body.style.userSelect="none";
  try{ if(navigator.vibrate) navigator.vibrate(8); }catch(e){}
  bdAuto();
}
function bdMove(e){
  if(!bd) return;
  const pt=e.touches?e.touches[0]:e;
  bd.lastX=pt.clientX; bd.lastY=pt.clientY;
  if(!bd.dragging){
    const dx=Math.abs(pt.clientX-bd.sx), dy=Math.abs(pt.clientY-bd.sy);
    if(e.type==="mousemove"){ if(dx>5||dy>5) bdStart(pt); }
    else if(dx>10||dy>10){ clearTimeout(bd.lp); bd.tap=false; }  // treat as scroll
    return;
  }
  if(e.cancelable) e.preventDefault();
  bd.ghost.style.left=(pt.clientX-bd.off.x)+"px";
  bd.ghost.style.top=(pt.clientY-bd.off.y)+"px";
  bd.ghost.style.visibility="hidden";
  let under=null; try{ under=document.elementFromPoint(pt.clientX, pt.clientY); }catch(_){}
  bd.ghost.style.visibility="";
  const col=(under&&under.closest)?under.closest(".kcol"):null;
  if(col!==bd.drop){ if(bd.drop) bd.drop.classList.remove("drop"); bd.drop=col; if(col) col.classList.add("drop"); }
}
function bdUp(){
  if(!bd) return;
  if(bd.lp) clearTimeout(bd.lp);
  window.removeEventListener("mousemove", bdMove);
  window.removeEventListener("mouseup", bdUp);
  if(bd.dragging){
    const target=bd.drop;
    if(bd.ghost) bd.ghost.remove();
    if(bd.card) bd.card.classList.remove("dragging");
    document.body.style.userSelect="";
    document.querySelectorAll(".kcol.drop").forEach(c=>c.classList.remove("drop"));
    if(bd.raf) cancelAnimationFrame(bd.raf);
    if(target){ const ns=+target.dataset.step; if(ns!==bd.from) bdMoveCard(bd.card, target, ns); }
  } else if(bd.tap){
    openDetail(bd.id);
  }
  bd=null;
}
function bdMoveCard(card, col, ns){
  const fromCol=card.closest(".kcol");
  col.querySelector(".kcol-body").appendChild(card);
  card.dataset.step=ns;
  const c=DB.clients.find(x=>x.id===card.dataset.id);
  if(c){ c.sopStep=ns; commit(); }
  [fromCol,col].forEach(refreshCol);
  toast("已移到 "+ns+". "+SOP[ns-1].short);
}
function refreshCol(col){
  if(!col) return;
  const body=col.querySelector(".kcol-body");
  const n=body.querySelectorAll(".kcard").length;
  col.querySelector(".kcol-head .c").textContent=n;
  let empty=body.querySelector(".kempty");
  if(n===0 && !empty){ const e=document.createElement("div"); e.className="kempty"; e.textContent="拖曳客戶到此"; body.appendChild(e); }
  if(n>0 && empty) empty.remove();
}
function bdAuto(){
  if(!bd || !bd.dragging) return;
  const b=document.getElementById("board");
  if(b){
    const r=b.getBoundingClientRect(); const edge=58, sp=16;
    if(bd.lastX<r.left+edge) b.scrollLeft-=sp;
    else if(bd.lastX>r.right-edge) b.scrollLeft+=sp;
    if(bd.drop){ const body=bd.drop.querySelector(".kcol-body"); if(body){ const br=body.getBoundingClientRect();
      if(bd.lastY<br.top+edge) body.scrollTop-=sp; else if(bd.lastY>br.bottom-edge) body.scrollTop+=sp; } }
  }
  bd.raf=requestAnimationFrame(bdAuto);
}

/* ---- reminders view ---- */
const MONTHNAMES=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const WEEKDAYS=["日","一","二","三","四","五","六"];
const EVTYPE={bday:["生日","t-bday"],pay:["繳費","t-pay"],mat:["滿期","t-mat"],visit:["複訪","t-visit"],care:["關懷","t-care"],manual:["待辦","t-manual"]};

function viewReminders(){
  if(calY==null){ const t=new Date(); calY=t.getFullYear(); calM=t.getMonth(); }
  const icCal=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4" stroke-linecap="round"/></svg>`;
  const icList=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01" stroke-linecap="round"/></svg>`;
  let head=`<div class="viewhead"><h2>行事曆</h2>
    <div class="spacer"></div>
    <div class="cmode">
      <button class="${calMode==="month"?"on":""}" onclick="setCalMode('month')">${icCal}月曆</button>
      <button class="${calMode==="list"?"on":""}" onclick="setCalMode('list')">${icList}待辦</button>
    </div></div>`;
  return head + (calMode==="list"? reminderListBody() : monthGridBody());
}
function setCalMode(m){ calMode=m; render(); }
function calShift(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} render(); }
function calToday(){ const t=new Date(); calY=t.getFullYear(); calM=t.getMonth(); render(); }

function monthGridBody(){
  const t=todayISO();
  const ev=eventsInMonth(calY,calM);
  const byDay={}; ev.forEach(e=>{ const d=+e.date.split("-")[2]; (byDay[d]=byDay[d]||[]).push(e); });
  const order={mat:0,bday:1,visit:2,pay:3,manual:4,care:5};
  Object.values(byDay).forEach(a=>a.sort((x,y)=>(order[x.type]??9)-(order[y.type]??9)));
  const firstDow=new Date(calY,calM,1).getDay();
  const daysIn=new Date(calY,calM+1,0).getDate();
  const prevDays=new Date(calY,calM,0).getDate();
  const cells=[];
  for(let i=0;i<42;i++){
    const dayNum=i-firstDow+1;
    let inMonth=true, n=dayNum, cy=calY, cm=calM;
    if(dayNum<1){ inMonth=false; n=prevDays+dayNum; cm=calM-1; if(cm<0){cm=11;cy--;} }
    else if(dayNum>daysIn){ inMonth=false; n=dayNum-daysIn; cm=calM+1; if(cm>11){cm=0;cy++;} }
    const iso=`${cy}-${pad(cm+1)}-${pad(n)}`;
    const evs=inMonth?(byDay[n]||[]):[];
    const isToday=iso===t;
    const dow=i%7;
    let chips="";
    if(evs.length){
      chips=evs.slice(0,3).map(e=>{ const [,tc]=EVTYPE[e.type]||["",""]; return `<div class="calchip ${tc}">${esc(e.who||e.title)}</div>`; }).join("");
      if(evs.length>3) chips+=`<div class="calmore">+${evs.length-3}</div>`;
    }
    cells.push(`<div class="calcell ${inMonth?"":"out"} ${isToday?"today":""}" onclick="${inMonth?`openDay('${iso}')`:""}">
      <div class="dn ${dow===0?"sun":""}">${n}</div>${chips}</div>`);
  }
  // legend
  const legend=[["mat","滿期"],["bday","生日"],["pay","繳費"],["visit","複訪"]].map(([k,l])=>{const[,tc]=EVTYPE[k];return `<span class="leg"><i class="${tc}"></i>${l}</span>`;}).join("");
  return `<div class="calbar">
      <button class="calnav" onclick="calShift(-1)">‹</button>
      <div class="mtitle">${calY} 年 ${MONTHNAMES[calM]}</div>
      <button class="calnav" onclick="calShift(1)">›</button>
      <button class="caltoday" onclick="calToday()">今天</button>
      <button class="tb-btn primary" style="height:38px;color:#241A06" onclick="scheduleVisit(null,null)">＋ 複訪</button>
    </div>
    <div class="calgrid">
      <div class="calhead">${WEEKDAYS.map((d,i)=>`<div class="${i===0?"sun":""}">${d}</div>`).join("")}</div>
      <div class="calweeks">${cells.join("")}</div>
    </div>
    <div class="callegend">${legend}</div>`;
}

function openDay(iso){
  const [y,m,d]=iso.split("-").map(Number);
  const evs=eventsInMonth(y,m-1).filter(e=>e.date===iso);
  const order={mat:0,bday:1,visit:2,pay:3,manual:4,care:5};
  evs.sort((a,b)=>(order[a.type]??9)-(order[b.type]??9));
  const wd=WEEKDAYS[new Date(iso).getDay()];
  const rows = evs.length? evs.map(e=>{
    const [tl,tc]=EVTYPE[e.type]||["",""];
    const canEdit=(e.type==="visit"||e.type==="manual")&&e.id;
    return `<div class="remitem" onclick="openDetail('${e.clientId}')" style="cursor:pointer">
      <span class="type ${tc}" style="flex:none">${tl}</span>
      <div class="body"><div class="t">${esc(e.title)}</div><div class="who">${esc(e.who)}</div></div>
      ${canEdit?`<button class="checkbtn" title="完成" onclick="event.stopPropagation();doneEvent('${e.clientId}','${e.id}','${iso}')">✓</button>
        <button class="checkbtn" title="刪除" style="border-color:var(--danger-soft);color:var(--danger)" onclick="event.stopPropagation();delEvent('${e.clientId}','${e.id}','${iso}')">×</button>`:""}
    </div>`;
  }).join("") : `<div style="color:var(--faint);font-size:14px;text-align:center;padding:18px 0">這天沒有排程</div>`;
  openSheet(`${m}月${d}日（${wd}）`, `${rows}
    <button class="btn green full" style="margin-top:14px" onclick="scheduleVisit('${iso}',null)">＋ 在這天排複訪</button>`);
}

function scheduleVisit(presetDate, presetCid){
  if(DB.clients.length===0){ toast("請先新增客戶","warn"); return; }
  const opts=DB.clients.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"","zh-Hant"))
    .map(c=>`<option value="${c.id}" ${c.id===presetCid?"selected":""}>${esc(c.name)}</option>`).join("");
  openSheet("排複訪", `
    <div class="field"><label>客戶</label><select id="vCid">${opts}</select></div>
    <div class="field"><label>日期</label><input type="date" id="vDate" value="${presetDate||todayISO()}"></div>
    <div class="field"><label>備註（選填）</label><input id="vNote" placeholder="例：保單健檢、送資料、加保討論"></div>
    <button class="btn green full" onclick="saveVisit()">排入行事曆</button>`);
}
function saveVisit(){
  const cid=$("#vCid").value; const c=DB.clients.find(x=>x.id===cid); if(!c) return;
  const date=$("#vDate").value; if(!date){ toast("請選日期","warn"); return; }
  const note=$("#vNote").value.trim();
  c.reminders=c.reminders||[];
  c.reminders.push({id:uid(), date, title:note?("複訪："+note):"複訪", kind:"visit", note, done:false});
  commit(); closeSheet();
  if(view==="reminders"){ render(); } else { go("reminders"); }
  toast("已排入行事曆");
}
function doneEvent(cid,id,iso){
  const c=DB.clients.find(x=>x.id===cid); if(!c) return;
  const r=(c.reminders||[]).find(x=>x.id===id); if(r){ r.done=true; commit(); render(); if(iso) openDay(iso); toast("已完成"); }
}
function delEvent(cid,id,iso){
  const c=DB.clients.find(x=>x.id===cid); if(!c) return;
  c.reminders=(c.reminders||[]).filter(x=>x.id!==id); commit(); render(); if(iso) openDay(iso); toast("已刪除");
}

function reminderListBody(){
  const rs=allReminders();
  const t=todayISO();
  const w=new Date(); w.setDate(w.getDate()+7); const week=w.toLocaleDateString("sv");
  const groups={over:[],today:[],week:[],later:[]};
  rs.forEach(r=>{ if(r.date<t) groups.over.push(r); else if(r.date===t) groups.today.push(r); else if(r.date<=week) groups.week.push(r); else groups.later.push(r); });
  if(rs.length===0) return `<div class="empty"><div class="big">🌿</div><h3>目前沒有排程</h3><p>填入客戶生日與保單日期會自動排程；也可在月曆上排複訪。</p>
    <button class="btn amber" style="margin-top:6px" onclick="scheduleVisit(null,null)">＋ 排複訪</button></div>`;
  const item=r=>{
    const [tl,tc]=EVTYPE[r.type]||["",""];
    const [,mm,dd]=r.date.split("-");
    const over=r.date<t;
    const dn = r.date===t? "今天" : (over? `逾 ${Math.abs(daysBetween(r.date,t))} 天` : `${daysBetween(t,r.date)} 天後`);
    const canEdit=(r.type==="visit"||r.type==="manual")&&r.id;
    return `<div class="remitem ${over?"over":""}" onclick="openDetail('${r.clientId}')">
      <div class="date"><b>${dd}</b>${mm}月</div>
      <div class="body"><div class="t">${esc(r.title)}</div><div class="who">${esc(r.who)} ・ ${dn}</div></div>
      <span class="type ${tc}">${tl}</span>
      ${canEdit?`<button class="checkbtn" onclick="event.stopPropagation();doneEvent('${r.clientId}','${r.id}')">✓</button>`:""}
    </div>`;
  };
  const grp=(key,label,cls="")=> groups[key].length? `<div class="remgroup ${cls}"><h4>${label} <span class="mono" style="opacity:.7">${groups[key].length}</span></h4>${groups[key].map(item).join("")}</div>`:"";
  return grp("over","逾期","over") + grp("today","今天") + grp("week","本週內") + grp("later","之後");
}
function doneReminder(cid,rid){
  const c=DB.clients.find(x=>x.id===cid); if(!c) return;
  const r=(c.reminders||[]).find(x=>x.id===rid); if(r){ r.done=true; commit(); render(); toast("已完成"); }
}

/* ---- SOP flow editor ---- */
let _sopEdit=null;
function openSopEditor(){
  _sopEdit = SOP.map(s=>({title:s.title, short:s.short, desc:s.desc}));
  renderSopEditor();
}
function renderSopEditor(){
  const rows=_sopEdit.map((s,i)=>`
    <div class="subcard">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
        <span style="width:26px;height:26px;border-radius:8px;background:var(--pine);color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none">${i+1}</span>
        <input value="${esc(s.title)}" oninput="sopSet(${i},'title',this.value)" placeholder="步驟名稱" style="flex:1;height:42px;border:1px solid var(--line);border-radius:10px;padding:0 12px">
        <button class="sopmini" onclick="sopMove(${i},-1)" ${i===0?"disabled":""}>↑</button>
        <button class="sopmini" onclick="sopMove(${i},1)" ${i===_sopEdit.length-1?"disabled":""}>↓</button>
        <button class="sopmini del" onclick="sopDel(${i})">×</button>
      </div>
      <div class="field" style="margin-bottom:8px"><label>短標（看板欄位／卡片顯示，2–3 字）</label>
        <input value="${esc(s.short)}" oninput="sopSet(${i},'short',this.value)" placeholder="例：需求" maxlength="6"></div>
      <div class="field" style="margin-bottom:0"><label>說明（選填）</label>
        <textarea oninput="sopSet(${i},'desc',this.value)" placeholder="這個階段要做什麼…" style="min-height:52px">${esc(s.desc)}</textarea></div>
    </div>`).join("");
  openSheet("自訂 SOP 流程", `
    <p style="font-size:13px;color:var(--muted);margin:0 0 14px">
      依你的銷售邏輯調整每個階段。改完後，看板、進度條、客戶頁、行事曆都會套用這套流程。（${_sopEdit.length} 個步驟，可 3–10 個）
    </p>
    ${rows}
    ${_sopEdit.length<10?`<button class="addrow" onclick="sopAdd()">＋ 新增步驟</button>`:`<p style="font-size:12px;color:var(--muted);text-align:center">已達上限 10 個步驟</p>`}
    <div class="btnrow" style="margin-top:16px">
      <button class="btn ghost" style="flex:1" onclick="sopResetDefault()">還原預設</button>
      <button class="btn green" style="flex:2" onclick="sopSave()">儲存流程</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px">建議在開始建立客戶前設定好；日後大幅調整順序，可能改變既有客戶目前所在的階段對應。</p>`);
}
function sopSet(i,k,v){ if(_sopEdit[i]) _sopEdit[i][k]=v; }
function sopMove(i,d){ const j=i+d; if(j<0||j>=_sopEdit.length) return; const t=_sopEdit[i]; _sopEdit[i]=_sopEdit[j]; _sopEdit[j]=t; renderSopEditor(); }
function sopDel(i){ if(_sopEdit.length<=3){ toast("至少要保留 3 個步驟","warn"); return; } _sopEdit.splice(i,1); renderSopEditor(); }
function sopAdd(){ if(_sopEdit.length>=10){ toast("最多 10 個步驟","warn"); return; } _sopEdit.push({title:"新步驟",short:"新",desc:""}); renderSopEditor(); }
function sopResetDefault(){ _sopEdit=DEFAULT_SOP.map(s=>({title:s.title,short:s.short,desc:s.desc})); renderSopEditor(); toast("已載入預設流程（尚未儲存）"); }
function sopSave(){
  for(const s of _sopEdit){ if(!(s.title||"").trim()){ toast("每個步驟都要有名稱","warn"); return; } }
  DB.meta.sop=_sopEdit.map(s=>({title:(s.title||"").trim(), short:((s.short||"").trim()||(s.title||"").trim().slice(0,3)), desc:(s.desc||"").trim()}));
  loadSOP();
  DB.clients.forEach(c=>{ if(!c.sopStep||c.sopStep<1) c.sopStep=1; if(c.sopStep>SOP.length) c.sopStep=SOP.length; });
  commit(); closeSheet();
  if(view!=="guide") go("guide"); else render();
  toast("SOP 流程已更新");
}

let lc=null;  // line composer state
const AUTO_VARS=["姓名","顧問"];
const POLICY_VARS={"公司":"company","保費":"premium","保單":"name"};
function lineCompose(cid, tid){
  const c=DB.clients.find(x=>x.id===cid); if(!c) return;
  const tpl=LINE_TPL.find(t=>t.id===tid)||LINE_TPL[0]; if(!tpl) return;
  const tokens=[...new Set((tpl.body.match(/\{([^}]+)\}/g)||[]).map(s=>s.slice(1,-1)))];
  const fields=tokens.filter(t=>!AUTO_VARS.includes(t));
  lc={cid, tid:tpl.id, fields};
  const pol=(c.policies||[])[0]||{};
  const prefill=t=>{ const k=POLICY_VARS[t]; return k?(pol[k]||""):""; };
  const usesPolicy=fields.some(t=>POLICY_VARS[t]);
  const polPick = ((c.policies||[]).length && usesPolicy)
    ? `<div class="field"><label>從保單帶入（選填）</label>
        <select id="lfPick" onchange="lineFillPolicy()"><option value="">選擇保單自動填入…</option>
        ${c.policies.map((p,i)=>`<option value="${i}">${esc(p.name||("保單 "+(i+1)))}${p.company?" ・"+esc(p.company):""}</option>`).join("")}</select></div>` : "";
  const inputs = fields.map((t,i)=>`<div class="field"><label>${esc(t)}</label>
     <input id="lf${i}" value="${esc(prefill(t))}" oninput="lineRender()" placeholder="填入${esc(t)}"></div>`).join("");
  openSheet(esc(tpl.title), `
    ${polPick}${inputs}
    <div class="formsec">預覽</div>
    <div class="linepreview" id="linePreview"></div>
    <button class="linebtn" style="margin-top:14px;justify-content:center" onclick="copyLine()">
      <span class="ic">💬</span><span style="font-weight:700">複製訊息，貼到 LINE 傳送</span></button>
    <button class="btn ghost full" style="margin-top:10px" onclick="openLineTplEditor('${tpl.id}')">✏️ 編輯這則範本</button>`);
  lineRender();
}
function lineFillPolicy(){
  const c=DB.clients.find(x=>x.id===lc.cid); if(!c) return;
  const i=$("#lfPick").value; if(i==="") return;
  const p=(c.policies||[])[+i]||{};
  lc.fields.forEach((t,idx)=>{ const el=$("#lf"+idx); if(!el) return; const k=POLICY_VARS[t]; if(k&&p[k]) el.value=p[k]; });
  lineRender();
}
function buildLineMsg(){
  if(!lc) return "";
  const c=DB.clients.find(x=>x.id===lc.cid); const tpl=LINE_TPL.find(t=>t.id===lc.tid);
  if(!c||!tpl) return "";
  const agent=(DB.meta.agent||"").trim();
  let body=tpl.body.split("{姓名}").join(c.name||"").split("{顧問}").join(agent);
  lc.fields.forEach((t,i)=>{ const v=(($("#lf"+i)||{}).value||""); body=body.split("{"+t+"}").join(v); });
  if(!agent) body=body.replace(/\n*——\s*$/,"");
  return body.replace(/[ \t]+\n/g,"\n").trim();
}
function lineRender(){ const el=$("#linePreview"); if(el) el.textContent=buildLineMsg(); }
function copyLine(){
  const txt=buildLineMsg();
  try{ navigator.clipboard.writeText(txt); }
  catch(e){ const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove(); }
  toast("已複製，貼到 LINE 即可傳送");
}

function tplSet(i,k,v){ if(_tplEdit[i]) _tplEdit[i][k]=v; }
function tplMove(i,d){ const j=i+d; if(j<0||j>=_tplEdit.length) return; const t=_tplEdit[i]; _tplEdit[i]=_tplEdit[j]; _tplEdit[j]=t; renderLineTplEditor(); }

function tplSave(){

  loadLineTemplates(); commit(); closeSheet(); toast("LINE 範本已儲存");
}

function editSopStep(cid, n){

    ${isCur
      ? `<div style="background:var(--amber-soft);color:#7a5410;font-size:13px;font-weight:600;padding:11px 13px;border-radius:11px;text-align:center">這位客戶目前就在第 ${n} 步</div>`

  `);

function setSopCurrent(cid,n){

  c.sopStep=n; commit(); editSopStep(cid,n); toast("已設為第 "+n+" 步："+SOP[n-1].short);
}
function saveSopStep(cid,n){
  const c=DB.clients.find(x=>x.id===cid); if(!c) return;

function clearSopStep(cid,n){

let _tessLoading=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(_tessLoading) return _tessLoading;
  _tessLoading=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload=()=>res(); s.onerror=()=>{ _tessLoading=null; rej(new Error("load fail")); };
    document.head.appendChild(s);
  });
  return _tessLoading;
}
function ocrStatusZh(s){
  return ({"loading tesseract core":"載入辨識引擎…","initializing tesseract":"初始化…","loading language traineddata":"下載中文辨識模組…","initializing api":"準備中…","recognizing text":"辨識中…"})[s]||"處理中…";
}
async function ocrImage(input){
  const f=input.files&&input.files[0]; if(!f){ return; }
  input.value="";
  openSheet("辨識截圖", `<div style="text-align:center;padding:26px 10px">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">正在辨識截圖文字…</div>
    <div style="font-size:14px;color:var(--pine);font-weight:700" id="ocrPct">載入辨識引擎…</div>
    <div style="height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:14px 20px 0">
      <div id="ocrBar" style="height:100%;width:5%;background:var(--amber);transition:width .3s"></div></div>
    <p style="font-size:12px;color:var(--muted);margin-top:18px">第一次使用需連網下載辨識模組（約數 MB），請稍候；之後會快很多。</p>
  </div>`);
  try{
    await loadTesseract();
    const worker = await Tesseract.createWorker(["chi_tra","eng"], 1, {
      logger:m=>{
        const pct=$("#ocrPct"), bar=$("#ocrBar");
        if(m.status==="recognizing text"){ const p=Math.round((m.progress||0)*100); if(pct) pct.textContent="辨識中 "+p+"%"; if(bar) bar.style.width=Math.max(8,p)+"%"; }
        else { if(pct) pct.textContent=ocrStatusZh(m.status); if(bar) bar.style.width=(m.status==="loading language traineddata"?"45":"25")+"%"; }
      }
    });
    const { data } = await worker.recognize(f);
    await worker.terminate();
    const text=((data&&data.text)||"").replace(/\n{3,}/g,"\n\n").trim();
    if(!text){ toast("沒辨識到文字，請換清楚一點的截圖，或改用貼上","warn"); openSmartImport(); return; }
    openSmartImport(text);
    toast("已辨識，請確認文字後按「辨識欄位並預覽」");
  }catch(e){
    openSmartImport();
    toast("辨識失敗（可能沒網路）。可改用 iPad 長按截圖文字→拷貝→貼上","err");
  }
}
function smartFile(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const text=String(r.result||"");
    if(/BEGIN:VCARD/i.test(text)){
      const list=parseVCards(text);
      if(list.length===0){ toast("檔案沒有可用的聯絡人","warn"); return; }
      showSmartPreview(list);
    } else {
      showSmartPreview([extractFields(text)]);
    }
  };
  r.onerror=()=>toast("讀取檔案失敗","err");
  r.readAsText(f);
}
function parseSmart(){
  const t=($("#siText").value||"").trim();
  if(!t){ toast("請先貼上文字","warn"); return; }
  showSmartPreview([extractFields(t)]);
}
function extractFields(text){
  const f={};
  const em=text.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/); if(em) f.email=em[0];
  let ph=text.match(/09\d{2}[\s\-.]?\d{3}[\s\-.]?\d{3}/);
  if(!ph) ph=text.match(/0\d{1,2}[\s\-.]?\d{3,4}[\s\-.]?\d{4}/);
  if(ph){ let dg=ph[0].replace(/\D/g,""); if(/^09\d{8}$/.test(dg)) dg=dg.replace(/(\d{4})(\d{3})(\d{3})/,"$1-$2-$3"); f.phone=dg; }
  let ln=text.match(/(?:LINE|line|賴|萊)\s*(?:ID|id|帳號|账号)?\s*[：:＝=]?\s*([A-Za-z0-9._\-]{3,30})/);
  if(ln && !/@/.test(ln[1])) f.lineId=ln[1];
  f.birthday=extractBirthday(text);
  let nm=text.match(/(?:姓名|名字|客戶|稱呼|名稱|聯絡人|Name)\s*[：:]\s*([\u4e00-\u9fa5]{2,5}|[A-Za-z][A-Za-z .]{1,20}[A-Za-z])/);
  if(nm){ f.name=nm[1].trim(); }
  else {
    const lines=text.split(/[\s\n\r、，,]+/).map(s=>s.trim()).filter(Boolean);
    for(const L of lines){
      if(/^[\u4e00-\u9fa5]{2,4}$/.test(L) && !/保險|公司|地址|電話|手機|行動|生日|出生|職業|先生|小姐|女士|備註|聯絡|資料/.test(L)){ f.name=L; break; }
    }
  }
  let oc=text.match(/(?:職業|工作|任職|職稱)\s*[：:]\s*([^\n\r，,]{1,16})/); if(oc) f.occupation=oc[1].trim();
  let ad=text.match(/(?:地址|住址|戶籍|通訊地址)\s*[：:]\s*([^\n\r]{4,40})/); if(ad) f.address=ad[1].trim();
  const region=detectRegion(f.address||text); if(region) f.region=region;
  return f;
}
const TW_REGIONS=["台北市","臺北市","新北市","桃園市","台中市","臺中市","台南市","臺南市","高雄市","基隆市","新竹市","新竹縣","苗栗縣","彰化縣","南投縣","雲林縣","嘉義市","嘉義縣","屏東縣","宜蘭縣","花蓮縣","台東縣","臺東縣","澎湖縣","金門縣","連江縣"];
function detectRegion(text){
  if(!text) return "";
  for(const r of TW_REGIONS){ if(text.includes(r)) return r.replace("臺","台"); }
  return "";
}
function extractBirthday(text){
  let m=text.match(/((?:19|20)\d{2})\s*[\/\-.年]\s*(\d{1,2})\s*[\/\-.月]\s*(\d{1,2})/);
  if(m) return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
  m=text.match(/民國\s*(\d{2,3})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})/);
  if(m) return `${1911+ +m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
  m=text.match(/(?:生日|出生)[^0-9]{0,6}(\d{2,3})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{1,2})/);
  if(m){ let y=+m[1]; if(y<200) y=1911+y; if(y>1900&&y<2100) return `${y}-${pad(+m[2])}-${pad(+m[3])}`; }
  return "";
}
function parseVCards(text){
  const blocks=text.split(/BEGIN:VCARD/i).slice(1);
  return blocks.map(raw=>{
    const b="\n"+raw.replace(/\r/g,"");
    const get=re=>{ const m=b.match(re); return m?m[1].trim():""; };
    let name=get(/\nFN[^:\n]*:(.+)/i);
    if(!name){ const n=get(/\nN[^:\n]*:(.+)/i); if(n){ const p=n.split(";"); name=((p[1]||"")+(p[0]||"")).trim()||p.join("").trim(); } }
    let tel=get(/\nTEL[^:\n]*:(.+)/i); if(tel){ let dg=tel.replace(/[^\d+]/g,""); const mob=dg.replace(/^\+886/,"0"); if(/^09\d{8}$/.test(mob)) dg=mob.replace(/(\d{4})(\d{3})(\d{3})/,"$1-$2-$3"); tel=dg; }
    let bday=get(/\nBDAY[^:\n]*:(.+)/i); if(bday){ const m=bday.match(/(\d{4})-?(\d{2})-?(\d{2})/); bday=m?`${m[1]}-${m[2]}-${m[3]}`:""; }
    const email=get(/\nEMAIL[^:\n]*:(.+)/i);
    const org=get(/\nORG[^:\n]*:(.+)/i).replace(/;+/g," ").trim();
    const title=get(/\nTITLE[^:\n]*:(.+)/i);
    const adr=get(/\nADR[^:\n]*:(.+)/i).replace(/;+/g," ").trim();
    return {name, phone:tel, birthday:bday, email, occupation:title||org, address:adr};
  }).filter(c=>c.name||c.phone);
}
function fieldRow(label,val){ return `<div class="kv"><span class="k">${label}</span><span class="v">${val?esc(val):`<span style="color:var(--faint);font-weight:400">未偵測</span>`}</span></div>`; }
function showSmartPreview(list){
  if(!list || !list.length){ toast("沒有辨識到資料","warn"); return; }
  if(list.length===1){
    _smartPrefill=list[0]; const f=list[0];
    const any=f.name||f.phone||f.birthday||f.email||f.lineId;
    openSheet("辨識結果", `
      <p style="font-size:13px;color:var(--muted);margin:0 0 12px">${any?"請確認辨識結果，下一步可再編輯後儲存。":"沒辨識到明確欄位，仍可手動補上。"}</p>
      <div class="block"><div class="block-body">
        ${fieldRow("姓名",f.name)}${fieldRow("電話",f.phone)}${fieldRow("生日",f.birthday)}${fieldRow("LINE",f.lineId)}${fieldRow("Email",f.email)}${fieldRow("職業",f.occupation)}${fieldRow("地址",f.address)}
      </div></div>
      <button class="btn green full" onclick="confirmSmart()">下一步：填入表單</button>
      <button class="btn ghost full" style="margin-top:10px" onclick="openSmartImport()">重新貼上</button>`);
  } else {
    _smartBulk=list;
    openSheet("匯入聯絡人", `
      <p style="font-size:13.5px;margin:0 0 12px">偵測到 <b>${list.length}</b> 位聯絡人，將各自建立客戶（含姓名、電話、生日等），建立後可再補資料。</p>
      <div class="block"><div class="block-body" style="max-height:260px;overflow:auto">
        ${list.map(c=>`<div class="kv"><span class="k" style="color:var(--ink);font-weight:600">${esc(c.name||"(無名)")}</span><span class="v" style="font-weight:500;color:var(--muted)">${esc(c.phone||"")}</span></div>`).join("")}
      </div></div>
      <button class="btn green full" onclick="confirmBulk()">全部匯入 ${list.length} 位</button>`);
  }
}
function confirmSmart(){ const f=_smartPrefill||{}; closeSheet(); editClient(null, f); }
function confirmBulk(){
  let n=0;
  (_smartBulk||[]).forEach(c=>{ if(!(c.name||c.phone)) return;
    DB.clients.push(Object.assign({id:uid(),reminders:[],claims:[],careLog:[],sopStatus:{},sopStep:1,grade:"",policies:[],createdAt:new Date().toISOString()},
      {name:c.name||"(未命名)",phone:c.phone||"",birthday:c.birthday||"",email:c.email||"",lineId:c.lineId||"",occupation:c.occupation||"",address:c.address||""}));
    n++;
  });
  _smartBulk=null; commit(); closeSheet(); go("clients"); toast(`已匯入 ${n} 位客戶`);
}

let editingPolicies=[];
function editClient(id, prefill){
  const c = id? DB.clients.find(x=>x.id===id) : null;
  const src = c || prefill || null;
  editingPolicies = (src && src.policies)? JSON.parse(JSON.stringify(src.policies)) : [];
  const v=(k,d="")=>src?esc(src[k]??d):d;
  const grade=src?(src.grade||""):"";
  const step=(src&&src.sopStep)?src.sopStep:1;

  const gradeBtns=["A","B","C","D",""].map(g=>{
    const m=GRADES[g]; const sel=g===grade?`sel s-${g||"none"}`:"";
    return `<button type="button" class="${sel}" data-g="${g}" onclick="pickGrade(this,'${g}')">${g||"未"}<small>${g?m.sub:"分級"}</small></button>`;
  }).join("");
  const sopBtns=SOP.map(s=>{
    const cls=s.n<step?"done":s.n===step?"cur":"";
    return `<button type="button" class="${cls}" data-n="${s.n}" onclick="pickStep(this,${s.n})"><span class="num">${s.n}</span><small>${esc(s.short)}</small></button>`;
  }).join("");

  openSheet(c?"編輯客戶":"新增客戶", `
    <input type="hidden" id="edId" value="${c?c.id:""}">
    <div class="field"><label>姓名 *</label><input id="edName" value="${v("name")}" placeholder="客戶姓名"></div>
    <div class="row2">
      <div class="field"><label>電話</label><input id="edPhone" inputmode="tel" value="${v("phone")}" placeholder="0912-345-678"></div>
      <div class="field"><label>LINE ID</label><input id="edLine" value="${v("lineId")}" placeholder="LINE 帳號"></div>
    </div>
    <div class="row2">
      <div class="field"><label>生日</label><input type="date" id="edBday" value="${v("birthday")}"></div>
      <div class="field"><label>職業</label><input id="edJob" value="${v("occupation")}" placeholder="職業"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Email</label><input id="edEmail" inputmode="email" value="${v("email")}" placeholder="電子郵件"></div>
      <div class="field"><label>地址</label><input id="edAddr" value="${v("address")}" placeholder="地址"></div>
    </div>
    <div class="field"><label>區域分類</label>
      <input id="edRegion" list="regionList" value="${v("region")}" placeholder="例：台中市、北區、大里">
      <datalist id="regionList">${allRegions().map(r=>`<option value="${esc(r)}">`).join("")}</datalist>
    </div>

    <div class="formsec">客戶分級</div>
    <input type="hidden" id="edGrade" value="${grade}">
    <div class="gradepick">${gradeBtns}</div>

    <div class="formsec">SOP 目前階段</div>
    <input type="hidden" id="edStep" value="${step}">
    <div class="soppick">${sopBtns}</div>

    <div class="formsec">了解需求</div>
    <div class="field"><textarea id="edNeeds" placeholder="家庭結構、財務狀況、最在意的保障缺口…">${v("needs")}</textarea></div>

    <div class="formsec">保單</div>
    <div id="polList"></div>
    <button type="button" class="addrow" onclick="addPolicyRow()">＋ 新增保單</button>

    <div class="formsec">備註</div>
    <div class="field"><textarea id="edNotes" placeholder="其他要記住的事…">${v("notes")}</textarea></div>

    <button class="btn green full" style="margin-top:18px;height:52px" onclick="saveClient()">${c?"儲存變更":"新增客戶"}</button>
  `);
  renderPolicyRows();
}
function pickGrade(btn,g){
  document.querySelectorAll(".gradepick button").forEach(b=>b.className="");
  btn.className=`sel s-${g||"none"}`; $("#edGrade").value=g;
}
function pickStep(btn,n){
  $("#edStep").value=n;
  document.querySelectorAll(".soppick button").forEach(b=>{ const bn=+b.dataset.n; b.className= bn<n?"done":bn===n?"cur":""; });
}
function renderPolicyRows(){
  const box=$("#polList"); if(!box) return;
  box.innerHTML = editingPolicies.map((p,i)=>`
    <div class="subcard">
      <button class="del" onclick="rmPolicy(${i})">×</button>
      <div class="field" style="margin-bottom:10px"><label>保單名稱</label><input value="${esc(p.name||"")}" oninput="polSet(${i},'name',this.value)" placeholder="例：終身醫療"></div>
      <div class="row2">
        <div class="field" style="margin-bottom:10px"><label>險種</label>
          <select onchange="polSet(${i},'type',this.value)">
            <option value="">選擇</option>
            ${POLICY_TYPES.map(t=>`<option ${p.type===t?"selected":""}>${t}</option>`).join("")}
          </select></div>
        <div class="field" style="margin-bottom:10px"><label>保險公司</label><input value="${esc(p.company||"")}" oninput="polSet(${i},'company',this.value)" placeholder="公司"></div>
      </div>
      <div class="row2">
        <div class="field" style="margin-bottom:10px"><label>保費（元）</label><input inputmode="numeric" value="${esc(p.premium||"")}" oninput="polSet(${i},'premium',this.value)" placeholder="年繳保費"></div>
        <div class="field" style="margin-bottom:10px"><label>投保日</label><input type="date" value="${esc(p.startDate||"")}" onchange="polSet(${i},'startDate',this.value)"></div>
      </div>
      <div class="row2">
        <div class="field" style="margin-bottom:0"><label>繳費日（月/日排程）</label><input type="date" value="${esc(p.paymentDate||"")}" onchange="polSet(${i},'paymentDate',this.value)"></div>
        <div class="field" style="margin-bottom:0"><label>滿期日</label><input type="date" value="${esc(p.maturityDate||"")}" onchange="polSet(${i},'maturityDate',this.value)"></div>
      </div>
    </div>`).join("");
}
function addPolicyRow(){ editingPolicies.push({id:uid(),name:"",type:"",company:"",premium:"",startDate:"",paymentDate:"",maturityDate:""}); renderPolicyRows(); }
function rmPolicy(i){ editingPolicies.splice(i,1); renderPolicyRows(); }
function polSet(i,k,v){ if(editingPolicies[i]) editingPolicies[i][k]=v; }

function saveClient(){
  const name=$("#edName").value.trim();
  if(!name){ toast("請填寫姓名","warn"); $("#edName").focus(); return; }
  const id=$("#edId").value;
  const data={
    name, phone:$("#edPhone").value.trim(), lineId:$("#edLine").value.trim(),
    birthday:$("#edBday").value, occupation:$("#edJob").value.trim(),
    email:($("#edEmail")||{}).value?.trim()||"", address:($("#edAddr")||{}).value?.trim()||"",
    region:($("#edRegion")||{}).value?.trim()||"",
    grade:$("#edGrade").value, sopStep:+$("#edStep").value||1,
    needs:$("#edNeeds").value.trim(), notes:$("#edNotes").value.trim(),
    policies:editingPolicies.filter(p=>p.name||p.type||p.company||p.premium),
  };
  if(id){
    const c=DB.clients.find(x=>x.id===id);
    Object.assign(c,data);
  }else{
    DB.clients.push(Object.assign({id:uid(),reminders:[],claims:[],careLog:[],sopStatus:{},createdAt:new Date().toISOString()},data));
  }
  commit(); closeSheet();
  if(id){ openDetail(id); } else { go("clients"); }
  toast(id?"已儲存變更":"已新增客戶");
}

/* ============ sheet / toast ============ */
function openSheet(title, body){
  const s=$("#scrim");
  s.innerHTML=`<div class="sheet"><div class="sheet-head"><h2>${title}</h2><button class="x" onclick="closeSheet()">×</button></div><div class="sheet-body">${body}</div></div>`;
  s.classList.add("show");
  s.onclick=(e)=>{ if(e.target===s) closeSheet(); };
  document.body.style.overflow="hidden";
}
function closeSheet(){ const s=$("#scrim"); s.classList.remove("show"); s.innerHTML=""; document.body.style.overflow=""; }
let toastT;
function toast(msg,kind=""){
  const t=$("#toast"); t.textContent=msg; t.className="toast show "+kind;
  clearTimeout(toastT); toastT=setTimeout(()=>t.className="toast "+kind,2600);
}

/* ============ boot ============ */
window.addEventListener("beforeunload",(e)=>{ if(dirty){ e.preventDefault(); e.returnValue=""; } });
(function init(){
  const had=tryLoadLocal();
  loadSOP(); loadLineTemplates();
  if(!lsOK){ /* file:// blocked localStorage */ }
  render();
  if(!lsOK){
    setTimeout(()=>toast("此頁無法自動暫存資料，請務必用右上角匯出備份","warn"),700);
  } else if(!had){
    // first run, nothing stored yet
  }
})();
</script>
